name: Generate Snake

on:
  # Berjalan otomatis setiap 24 jam
  schedule:
    - cron: "0 0 * * *"
  
  # Mengizinkan kita menjalankan script ini secara manual kapan saja
  workflow_dispatch:
  
  # Berjalan otomatis setiap kali ada perubahan di branch main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates a game of snake from a github user contributions graph, output a svg animation at <target_branch>
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Push file svg yang dihasilkan ke branch 'output'
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
